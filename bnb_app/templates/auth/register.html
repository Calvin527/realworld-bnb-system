{% extends 'base.html' %} {% block title %}Create Account{% endblock %} {% block
content %}
<div class="auth-card">
  <h1>Create Account</h1>

  <form method="post" class="form" id="registerForm" novalidate>
    <label>
      Full Name
      <input
        type="text"
        name="full_name"
        id="full_name"
        placeholder="Enter your full name"
        required
      />
      <small class="field-error" id="fullNameError"></small>
    </label>

    <label>
      Email
      <input
        type="email"
        name="email"
        id="email"
        placeholder="example@gmail.com"
        required
      />
      <small class="field-error" id="emailError"></small>
    </label>

    <label>
      Phone
      <input
        type="text"
        name="phone"
        id="phone"
        placeholder="0712345678"
        maxlength="10"
        inputmode="numeric"
      />
      <small class="field-error" id="phoneError"></small>
    </label>

    <label>
      Password
      <input
        type="password"
        name="password"
        id="password"
        placeholder="Example: Calvin@2026"
        required
      />
      <small class="field-error" id="passwordError"></small>
    </label>

    <label>
      Confirm Password
      <input
        type="password"
        name="confirm_password"
        id="confirm_password"
        placeholder="Re-enter your password"
        required
      />
      <small class="field-error" id="confirmPasswordError"></small>
    </label>

    <button class="btn" type="submit">Create Account</button>
  </form>

  <p>
    Already have an account?
    <a href="{{ url_for('auth.login') }}">Login</a>
  </p>
</div>

<script>
  const form = document.getElementById("registerForm");

  const fullName = document.getElementById("full_name");
  const email = document.getElementById("email");
  const phone = document.getElementById("phone");
  const password = document.getElementById("password");
  const confirmPassword = document.getElementById("confirm_password");

  const fullNameError = document.getElementById("fullNameError");
  const emailError = document.getElementById("emailError");
  const phoneError = document.getElementById("phoneError");
  const passwordError = document.getElementById("passwordError");
  const confirmPasswordError = document.getElementById("confirmPasswordError");

  function validateFullName() {
    const value = fullName.value.trim();
    const pattern = /^[A-Za-zÀ-ÿ\s'-]{2,120}$/;

    if (!value) {
      fullNameError.textContent = "Full name is required.";
      return false;
    }

    if (/[0-9]/.test(value)) {
      fullNameError.textContent = "You cannot write your name with numbers.";
      return false;
    }

    if (!pattern.test(value)) {
      fullNameError.textContent =
        "Name can only contain letters, spaces, apostrophes, and hyphens.";
      return false;
    }

    fullNameError.textContent = "";
    return true;
  }

  function validateEmail() {
    const value = email.value.trim();
    const pattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

    if (!value) {
      emailError.textContent = "Email is required.";
      return false;
    }

    if (!pattern.test(value)) {
      emailError.textContent = "Please enter a valid Gmail address.";
      return false;
    }

    emailError.textContent = "";
    return true;
  }

  function validatePhone() {
    const value = phone.value;

    if (!value) {
      phoneError.textContent = "";
      return true;
    }

    if (value.length !== 10) {
      phoneError.textContent = "Phone number must be exactly 10 digits.";
      return false;
    }

    if (!/^0[0-9]{9}$/.test(value)) {
      phoneError.textContent = "Phone must start with 0 (e.g. 0712345678).";
      return false;
    }

    phoneError.textContent = "";
    return true;
  }

  function validatePassword() {
    const value = password.value;

    if (!value) {
      passwordError.textContent = "Password is required.";
      return false;
    }

    if (value.length < 8) {
      passwordError.textContent =
        "Password must be at least 8 characters long.";
      return false;
    }

    if (!/[A-Z]/.test(value)) {
      passwordError.textContent =
        "Password must contain at least one uppercase letter.";
      return false;
    }

    if (!/[a-z]/.test(value)) {
      passwordError.textContent =
        "Password must contain at least one lowercase letter.";
      return false;
    }

    if (!/[0-9]/.test(value)) {
      passwordError.textContent = "Password must contain at least one number.";
      return false;
    }

    if (!/[!@#$%^&*(),.?":{}|<>]/.test(value)) {
      passwordError.textContent =
        "Password must contain at least one special character.";
      return false;
    }

    passwordError.textContent = "";
    return true;
  }

  function validateConfirmPassword() {
    if (!confirmPassword.value) {
      confirmPasswordError.textContent = "Please confirm your password.";
      return false;
    }

    if (confirmPassword.value !== password.value) {
      confirmPasswordError.textContent = "Passwords do not match.";
      return false;
    }

    confirmPasswordError.textContent = "";
    return true;
  }

  fullName.addEventListener("input", validateFullName);
  email.addEventListener("input", validateEmail);
  phone.addEventListener("input", validatePhone);
  password.addEventListener("input", function () {
    validatePassword();
    validateConfirmPassword();
  });
  confirmPassword.addEventListener("input", validateConfirmPassword);

  form.addEventListener("submit", function (event) {
    const valid =
      validateFullName() &&
      validateEmail() &&
      validatePhone() &&
      validatePassword() &&
      validateConfirmPassword();

    if (!valid) {
      event.preventDefault();
    }
  });
  phone.addEventListener("input", function () {
    // Remove anything that is not a number
    phone.value = phone.value.replace(/[^0-9]/g, "");

    // Limit to exactly 10 digits
    if (phone.value.length > 10) {
      phone.value = phone.value.slice(0, 10);
    }

    validatePhone();
  });
</script>
{% endblock %}
