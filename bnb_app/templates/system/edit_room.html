{% extends 'base.html' %} {% block title %}Edit Room | Makgobelo Lodge{%
endblock %} {% block content %}
<h1>Edit Room</h1>

<form method="POST">
  <div class="form-group">
    <label for="room_name">Room Name</label>
    <input
      type="text"
      id="room_name"
      name="room_name"
      value="{{ room.room_name }}"
      required
    />
  </div>

  <div class="form-group">
    <label for="room_type">Room Type</label>
    <input
      type="text"
      id="room_type"
      name="room_type"
      value="{{ room.room_type }}"
      required
    />
  </div>

  <div class="form-group">
    <label for="capacity">Capacity</label>
    <input
      type="number"
      id="capacity"
      name="capacity"
      min="1"
      value="{{ room.capacity }}"
      required
    />
  </div>

  <div class="form-group">
    <label for="price_per_night">Price Per Night</label>
    <input
      type="number"
      step="0.01"
      id="price_per_night"
      name="price_per_night"
      value="{{ room.price_per_night }}"
      required
    />
  </div>

  <button type="submit" class="btn">Update Room</button>
</form>
{% endblock %}
